<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Raylook · 01c · Barra de progresso segmentada</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="_base.css">
<link rel="stylesheet" href="_modal.css">
<style>
    .flow-bar {
        display: flex; gap: 4px; height: 90px; margin-bottom: 24px;
    }
    .flow-seg {
        flex: var(--fw, 1);
        background: var(--seg-bg);
        border: 1px solid var(--card-border);
        border-radius: 10px; cursor: pointer; transition: var(--transition);
        padding: 12px 14px; color: var(--text-primary);
        display: flex; flex-direction: column; justify-content: space-between;
        position: relative; overflow: hidden;
    }
    .flow-seg:hover { transform: translateY(-2px); border-color: var(--accent); }
    .flow-seg.active { border: 1px solid var(--accent); box-shadow: 0 8px 24px rgba(212,175,55,0.25); }
    .flow-seg::before {
        content: ''; position: absolute; left: 0; right: 0; bottom: 0; height: 3px;
        background: var(--seg-color);
    }
    .flow-seg .top {
        display: flex; justify-content: space-between; align-items: center;
        font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
        font-weight: 700; color: var(--text-muted);
    }
    .flow-seg .num-tag {
        font-family: 'Outfit', sans-serif; font-size: 10px; font-weight: 700;
        color: var(--seg-color); background: rgba(255,255,255,0.06);
        padding: 1px 7px; border-radius: 999px;
    }
    .flow-seg .count {
        font-family: 'Outfit', sans-serif; font-size: 28px; font-weight: 700;
        color: var(--seg-color); line-height: 1;
    }
    .flow-seg .name {
        font-family: 'Outfit', sans-serif; font-weight: 600;
        font-size: 13px; color: var(--text-primary);
    }

    .inv-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 14px; min-height: 150px;
    }
    .empty-state { grid-column: 1/-1; text-align: center; padding: 40px;
                   color: var(--text-muted); font-style: italic; }

    .inv-card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(212, 175, 55, 0.1);
        border-radius: 14px; overflow: hidden;
        transition: var(--transition);
    }
    .inv-card:hover { transform: translateY(-2px); border-color: var(--accent-soft); }
    .inv-card-img {
        aspect-ratio: 2/1; display: flex; align-items: center; justify-content: center;
        font-size: 36px; position: relative;
        background: linear-gradient(135deg, rgba(212,175,55,0.1), rgba(0,0,0,0.35));
    }
    .inv-card-badge { position: absolute; top: 10px; left: 10px; }
    .inv-card-body { padding: 14px 16px; }
    .inv-card-title {
        font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 15px;
        color: var(--text-primary);
    }
    .inv-card-meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .inv-card-row {
        display: flex; justify-content: space-between; align-items: center;
        margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05);
    }
    .inv-card-row .price {
        font-family: 'Outfit', sans-serif; font-weight: 700; color: var(--accent); font-size: 15px;
    }
</style>
</head>
<body>

<div class="mockup-brief">
    <span class="tag">Variação 01c · Barra segmentada</span>
    <h1>Fluxo visual como "linha de produção"</h1>
    <p>Os 6 estados viram segmentos proporcionais à contagem (o estado com
       mais pacotes fica maior). Dá uma sensação visual imediata de onde o volume
       está concentrado no fluxo.</p>
</div>

<div class="glass-card">
    <div class="flow-bar" id="flow-bar"></div>
    <div class="section-title" id="state-title">—</div>
    <div class="inv-grid" id="grid"><div class="empty-state">Carregando…</div></div>
</div>

<script src="_mockups-lib.js"></script>
<script src="_modal.js"></script>
<script src="01c-stepper-progress.js"></script>
</body>
</html>
