<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Raylook · Fluxo 2 · Lanes horizontais</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="_base.css">
<link rel="stylesheet" href="_modal.css">
<style>
    .lanes { display: flex; flex-direction: column; gap: 14px; }
    .lane {
        background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(12px);
        border: 1px solid var(--card-border); border-radius: var(--radius-md);
        display: grid; grid-template-columns: 220px 1fr;
        overflow: hidden; transition: var(--transition);
    }
    .lane:hover { background: rgba(255, 255, 255, 0.04); }
    .lane-head {
        padding: 18px 20px; border-right: 1px solid rgba(255, 255, 255, 0.065);
        display: flex; flex-direction: column; justify-content: center; gap: 6px;
        background: rgba(255, 255, 255, 0.04); position: relative;
    }
    .lane-head::before {
        content: ''; position: absolute; left: 0; top: 16px; bottom: 16px;
        width: 4px; border-radius: 2px; background: var(--lane-color);
    }
    .lane-name {
        font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 700;
        color: var(--primary);
    }
    .lane-desc { font-size: 11px; color: var(--text-secondary); line-height: 1.45; }
    .lane-count {
        font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 700;
        color: var(--lane-color); margin-top: 4px;
        font-variant-numeric: tabular-nums;
    }
    .lane-body {
        padding: 14px 18px; overflow-x: auto; display: flex; gap: 10px;
        align-items: center; min-height: 110px;
    }
    .lane-body::-webkit-scrollbar { height: 4px; }
    .lane-body::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.120); border-radius: 2px; }

    .pkg {
        flex-shrink: 0; min-width: 230px;
        background: rgba(255, 255, 255, 0.1); border: 1px solid var(--card-border);
        border-radius: var(--radius-sm); padding: 10px 14px;
        display: flex; flex-direction: column; gap: 4px;
        transition: var(--transition); cursor: pointer;
    }
    .pkg:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(0, 0, 0, 0.31); }
    .pkg-title {
        font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 700; color: var(--primary);
    }
    .pkg-meta { font-size: 11px; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
    .pkg-row {
        display: flex; justify-content: space-between; align-items: center;
        margin-top: 4px; font-size: 12px;
    }
    .pkg-value {
        font-family: 'Outfit', sans-serif; font-weight: 700; color: var(--success);
    }
    .pkg-age {
        font-size: 10px; color: var(--text-muted);
        text-transform: uppercase; letter-spacing: 0.04em;
    }

    .lane-empty { color: var(--text-muted); font-size: 12px; font-style: italic; padding-left: 4px; }

    .lane-1 { --lane-color: var(--step-aberto); }
    .lane-2 { --lane-color: var(--step-fechado); }
    .lane-3 { --lane-color: var(--step-confirmado); }
    .lane-4 { --lane-color: var(--step-pendente); }
    .lane-5 { --lane-color: var(--step-separado); }
    .lane-6 { --lane-color: var(--step-enviado); }
</style>
</head>
<body>

<div class="mockup-brief">
    <span class="tag">Fluxo 2 / 5 · Lanes horizontais</span>
    <h1>Seis faixas de status empilhadas</h1>
    <p>Cada estado é uma faixa com seus pacotes deslizando horizontalmente.
       Dados vivos de <code>/api/mockups/packages</code>.</p>
</div>

<div class="lanes" id="lanes"></div>

<script src="_mockups-lib.js"></script>
<script src="_modal.js"></script>
<script src="02-lanes-horizontais.js"></script>
</body>
</html>
