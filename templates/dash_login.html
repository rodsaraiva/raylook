<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Alana Camilo Assessoria</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #B89494;
            --card-bg: rgba(255, 255, 255, 0.42);
            --card-border: rgba(255, 255, 255, 0.25);
            --primary: #4A3B3B;
            --secondary: #FDD7D7;
            --text-primary: #2D1F1F;
            --text-secondary: #5C4A4A;
            --danger: #8B4444;
            --danger-bg: rgba(139, 68, 68, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background: var(--bg-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 0% 0%, rgba(74,59,59,0.15) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(253,215,215,0.3) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }
        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            text-align: center;
            width: 100%;
            max-width: 380px;
            margin: 1rem;
        }
        .login-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .login-logo .main {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: var(--primary);
        }
        .login-logo .sub {
            font-size: 0.6rem;
            font-weight: 400;
            letter-spacing: 0.35em;
            color: var(--text-secondary);
            text-transform: uppercase;
        }
        .login-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--secondary), #fff);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.2rem;
            font-size: 1.3rem;
            color: var(--primary);
            box-shadow: 0 6px 16px rgba(0,0,0,0.06);
        }
        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            color: var(--text-primary);
        }
        .subtitle {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }
        .alert {
            padding: 0.65rem 0.9rem;
            border-radius: 10px;
            font-size: 0.82rem;
            margin-bottom: 1rem;
            text-align: left;
            background: var(--danger-bg);
            color: var(--danger);
            border: 1px solid rgba(139,68,68,0.2);
        }
        .alert i { margin-right: 0.3rem; }
        form { text-align: left; }
        label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.35rem;
        }
        .input-wrap {
            position: relative;
            margin-bottom: 1rem;
        }
        .input-wrap i {
            position: absolute;
            left: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 0.85rem;
            opacity: 0.6;
        }
        .input-wrap input {
            width: 100%;
            background: rgba(255,255,255,0.5);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 0.75rem 0.9rem 0.75rem 2.5rem;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s ease;
        }
        .input-wrap input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(74,59,59,0.1);
        }
        .btn {
            width: 100%;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 0.85rem;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 6px 16px rgba(74,59,59,0.3);
            font-family: 'Outfit', sans-serif;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(74,59,59,0.35);
            filter: brightness(1.06);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <span class="main">ALANA CAMILO</span>
            <span class="sub">ASSESSORIA</span>
        </div>
        <div class="login-icon">
            <i class="fas fa-chart-line"></i>
        </div>
        <h1>Dashboard</h1>
        <p class="subtitle">Acesso restrito</p>

        {% if error %}
        <div class="alert">
            <i class="fas fa-exclamation-circle"></i> Senha incorreta.
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <label for="password">Senha</label>
            <div class="input-wrap">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" name="password" placeholder="Digite a senha" required autofocus>
            </div>
            <button type="submit" class="btn">
                <i class="fas fa-arrow-right"></i>
                Entrar
            </button>
        </form>
    </div>
</body>
</html>
