<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Raylook</title>
    <link rel="stylesheet" href="/static/dashboard/base.css">
    <style>
        body {
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }
        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(14px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--card-shadow);
            padding: 36px 32px 32px;
            width: 100%; max-width: 400px;
        }
        .brand {
            text-align: center; margin-bottom: 28px;
        }
        .brand .name {
            font-family: 'Outfit', sans-serif; font-size: 28px; font-weight: 700;
            letter-spacing: 0.06em; color: var(--accent);
        }
        .brand .sub {
            font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase;
            color: var(--text-muted); font-weight: 600; margin-top: 4px;
        }
        h1 {
            font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 700;
            color: var(--text-primary); text-align: center; margin-bottom: 4px;
        }
        .hint {
            color: var(--text-muted); font-size: 12px; text-align: center;
            margin-bottom: 22px;
        }
        .alert {
            background: var(--danger-soft); color: var(--danger);
            border: 1px solid rgba(248, 113, 113, 0.3);
            padding: 10px 12px; border-radius: 10px;
            font-size: 12px; margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }
        label {
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
            font-weight: 700; color: var(--text-muted); display: block;
            margin-bottom: 8px;
        }
        input[type="password"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px 14px;
            color: var(--text-primary);
            font-family: inherit; font-size: 14px;
            outline: none;
            transition: var(--transition);
        }
        input[type="password"]:focus {
            border-color: var(--accent);
            background: rgba(212, 175, 55, 0.04);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }
        .btn {
            width: 100%; margin-top: 20px;
            background: var(--accent); color: var(--bg-main);
            border: none; padding: 13px 16px;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 0.02em;
        }
        .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn:active { transform: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">
            <div class="name">RAYLOOK</div>
            <div class="sub">Dashboard</div>
        </div>

        <h1>Acesso restrito</h1>
        <p class="hint">Entre com usuário e senha pra acessar o painel.</p>

        {% if error %}
        <div class="alert">⚠ Usuário ou senha incorretos.</div>
        {% endif %}

        <form method="POST" action="/login">
            <label for="username">Usuário</label>
            <input type="text" id="username" name="username" placeholder="admin / estoque / logistica"
                   autocapitalize="off" autocorrect="off" autocomplete="username" required autofocus
                   style="width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px 14px;color:var(--text-primary);font-family:inherit;font-size:14px;outline:none;margin-bottom:14px;">
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
            <button type="submit" class="btn">Entrar</button>
        </form>
    </div>
</body>
</html>
