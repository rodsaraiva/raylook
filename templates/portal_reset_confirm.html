<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Senha — Raylook</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/portal.css">
</head>
<body>
    <div class="page">
        <header>
            <div class="logo-text">
                <span class="logo-main">RAYLOOK</span>
                
            </div>
        </header>

        <div class="auth-card">
            <div class="auth-icon">
                <i class="fas fa-lock-open"></i>
            </div>
            <h1>Nova senha</h1>
            <p class="auth-subtitle">{{ nome.split()[0] if nome else 'Cliente' }}, crie uma nova senha para acessar seus pedidos</p>

            {% if errors %}
            <div class="alert alert-error">
                {% for e in errors %}
                <div><i class="fas fa-exclamation-circle"></i> {{ e }}</div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="POST" action="/portal/reset/{{ token }}">
                <div class="form-group">
                    <label for="password">Nova senha</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password"
                               placeholder="Mínimo 6 caracteres" minlength="6" required autofocus>
                        <button type="button" class="pwd-toggle" data-target="password" tabindex="-1" aria-label="Mostrar senha">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password_confirm">Confirmar nova senha</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password_confirm" name="password_confirm"
                               placeholder="Repita a senha" minlength="6" required>
                        <button type="button" class="pwd-toggle" data-target="password_confirm" tabindex="-1" aria-label="Mostrar senha">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-primary">
                    <i class="fas fa-check"></i>
                    <span>Salvar e entrar</span>
                </button>
            </form>
            <script src="/static/js/portal_form.js"></script>
        </div>

        <div class="footer-note">
            <i class="fas fa-shield-halved"></i> Portal seguro — Raylook
        </div>
    </div>
</body>
</html>
