<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Raylook · Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/static/dashboard/base.css">
<link rel="stylesheet" href="/static/dashboard/modal.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    body { padding: 22px 32px 60px; }
    /* Cor própria pro estado "pago" (não vinha em base.css). */
    :root { --step-pago: #22c55e; }
    .status-pill.status-pago { color: var(--step-pago); background: rgba(34, 197, 94, 0.14); }
    .topbar {
        display: flex; align-items: baseline; justify-content: space-between;
        margin-bottom: 22px;
    }
    .topbar h1 {
        font-family: 'Outfit', sans-serif; font-size: 26px; font-weight: 700;
        letter-spacing: -0.01em;
    }
    .topbar .sub { color: var(--text-muted); font-size: 13px; }
    .topbar a.logout {
        color: var(--text-muted); font-size: 12px; text-decoration: none;
        padding: 6px 12px; border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.08);
    }
    .topbar a.logout:hover { color: var(--accent); border-color: var(--accent-soft); }

    .filter-bar {
        display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
        margin-bottom: 18px; padding: 10px 14px;
        background: rgba(255,255,255,0.03); border: 1px solid var(--card-border);
        border-radius: var(--radius-md);
    }
    .filter-bar .label {
        font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
        color: var(--text-muted); font-weight: 700; margin-right: 4px;
    }
    .filter-pill {
        padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 600;
        background: rgba(255,255,255,0.04); color: var(--text-secondary);
        border: 1px solid rgba(255,255,255,0.08); cursor: pointer;
        font-family: inherit; transition: var(--transition);
    }
    .filter-pill:hover { background: rgba(255,255,255,0.07); color: var(--text-primary); }
    .filter-pill.active {
        background: var(--accent-soft); color: var(--accent);
        border-color: rgba(212, 175, 55, 0.4);
    }
    .filter-custom {
        display: none; align-items: center; gap: 6px; margin-left: 4px;
    }
    .filter-custom.visible { display: inline-flex; }
    .filter-custom input[type="date"] {
        background: rgba(255,255,255,0.05); color: var(--text-primary);
        border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
        padding: 5px 8px; font-size: 12px; font-family: inherit;
        color-scheme: dark;
    }
    .filter-custom .sep { color: var(--text-muted); font-size: 12px; }
    .filter-custom button {
        padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 700;
        background: var(--accent); color: var(--bg-main); border: none;
        cursor: pointer; font-family: inherit;
    }
    .filter-custom button:hover { filter: brightness(1.1); }
    .filter-summary {
        margin-left: auto; font-size: 12px; color: var(--text-muted);
        font-variant-numeric: tabular-nums;
    }

    .layout { display: grid; grid-template-columns: 240px 1fr 420px; gap: 14px; }

    /* Rail (de 01a-stepper-vertical.html) */
    /* Sidebar: rail de fluxo + bloco financeiro empilhados */
    .sidebar {
        display: flex; flex-direction: column; gap: 10px;
        position: sticky; top: 20px; height: fit-content;
    }

    .rail {
        display: flex; flex-direction: column; gap: 8px;
    }

    /* Dropdown (Comercial / Estoque) */
    .rail-group {
        background: var(--card-bg); backdrop-filter: blur(14px);
        border: 1px solid var(--card-border); border-radius: var(--radius-lg);
        overflow: hidden;
    }
    .rail-group-header {
        display: flex; align-items: center; gap: 10px;
        padding: 12px 14px; cursor: pointer; transition: background 0.2s;
    }
    .rail-group-header:hover { background: rgba(255,255,255,0.03); }
    .rail-group-label {
        flex: 1; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
        font-weight: 700; color: var(--accent);
    }
    .rail-group-total {
        font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700;
        color: var(--text-primary); font-variant-numeric: tabular-nums;
    }
    .rail-group-chevron {
        font-size: 10px; color: var(--text-muted); transition: transform 0.3s;
    }
    .rail-group.open .rail-group-chevron { transform: rotate(180deg); }
    .rail-group-body {
        display: none; padding: 4px 10px 12px; flex-direction: column; gap: 4px;
    }
    .rail-group.open .rail-group-body { display: flex; }

    .rail-step {
        display: grid; grid-template-columns: 28px 1fr auto; gap: 10px;
        align-items: center; padding: 10px 12px; border-radius: var(--radius-sm);
        cursor: pointer; transition: var(--transition);
        border: 1px solid transparent;
    }
    .rail-step:hover { background: rgba(255,255,255,0.04); }
    .rail-step.active {
        background: var(--accent-soft); border-color: rgba(212, 175, 55, 0.35);
    }
    .rail-step .num {
        width: 26px; height: 26px; border-radius: 50%;
        background: rgba(255,255,255,0.04); color: var(--text-muted);
        display: flex; align-items: center; justify-content: center;
        font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 700;
    }
    .rail-step.active .num { background: var(--accent); color: var(--bg-main); }
    .rail-step .label {
        font-size: 13px; font-weight: 600; color: var(--text-primary); line-height: 1.2;
    }
    .rail-step .sub { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
    .rail-step .count {
        font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 700;
        color: var(--text-primary); font-variant-numeric: tabular-nums;
    }
    .rail-step.active .count { color: var(--accent); }

    .rail-cancelled {
        background: var(--card-bg); backdrop-filter: blur(14px);
        border: 1px solid var(--card-border); border-radius: var(--radius-lg);
        padding: 12px 14px; opacity: 0.85;
    }

    /* Lista (de 05-split-detalhe.html) */
    .pkg-list {
        background: rgba(255,255,255,0.04); border: 1px solid var(--card-border);
        border-radius: var(--radius-md); overflow: hidden;
    }
    .pkg-list-head {
        padding: 14px 18px; display: flex; justify-content: space-between;
        align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.065);
        background: rgba(255,255,255,0.04);
    }
    .pkg-list-title {
        font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 700;
        color: var(--primary);
    }
    .pkg-list-summary {
        font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums;
    }
    .search-box {
        background: rgba(255,255,255,0.05); color: var(--text-primary);
        border: 1px solid rgba(255,255,255,0.12); border-radius: 10px;
        padding: 6px 12px; font-size: 12px; width: 200px; font-family: inherit;
    }
    .pkg-row {
        padding: 12px 18px; display: grid;
        grid-template-columns: 56px 1fr auto auto; gap: 10px; align-items: center;
        border-bottom: 1px solid rgba(255,255,255,0.052); cursor: pointer;
        transition: background 0.15s;
    }
    .row-back {
        width: 28px; height: 28px; border-radius: 8px;
        background: transparent; color: var(--text-muted);
        border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
        font-size: 13px; font-weight: 700; padding: 0;
        display: flex; align-items: center; justify-content: center;
        transition: var(--transition);
    }
    .row-back:hover { background: rgba(255,255,255,0.06); color: var(--accent); border-color: var(--accent-soft); }
    .row-back:disabled { opacity: 0.4; cursor: wait; }
    .row-action {
        padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 700;
        font-family: inherit; cursor: pointer; transition: var(--transition);
        background: var(--accent); color: var(--bg-main); border: none;
        white-space: nowrap;
    }
    .row-action:hover { filter: brightness(1.12); transform: translateY(-1px); }
    .row-action:disabled { opacity: 0.5; cursor: wait; transform: none; }
    .row-action.ghost {
        background: transparent; color: var(--text-secondary);
        border: 1px solid rgba(255,255,255,0.12);
    }
    .row-action.ghost:hover { background: rgba(255,255,255,0.06); color: var(--accent); border-color: var(--accent-soft); }
    .row-action.warning {
        background: var(--warning); color: var(--bg-main); border: none;
    }
    .row-action.warning:hover { filter: brightness(1.1); }
    .row-action.danger {
        background: transparent; color: var(--danger);
        border: 1px solid rgba(248, 113, 113, 0.3);
    }
    .row-action.danger:hover { background: var(--danger-soft); border-color: var(--danger); }
    .pkg-row-actions { display: flex; gap: 6px; align-items: center; }
    .pkg-row:hover { background: rgba(255,255,255,0.06); }
    .pkg-row.selected {
        background: rgba(255,255,255,0.1);
        border-left: 3px solid var(--accent); padding-left: 15px;
    }
    .pkg-thumb {
        width: 56px; height: 56px; border-radius: 10px; overflow: hidden;
        background: linear-gradient(135deg, rgba(212,175,55,0.08), rgba(0,0,0,0.3));
        display: flex; align-items: center; justify-content: center;
        font-size: 22px; flex-shrink: 0;
    }
    .pkg-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .pkg-row-main .name {
        font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700;
        color: var(--primary);
        display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical;
        overflow: hidden;
    }
    .pkg-row-main .sub {
        font-size: 11px; color: var(--text-muted); margin-top: 2px;
        font-variant-numeric: tabular-nums;
    }
    .pkg-row-meta {
        text-align: right; font-family: 'Outfit', sans-serif;
        font-size: 14px; font-weight: 700; color: var(--success);
    }
    .pkg-row-meta .sub {
        font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 400;
        color: var(--text-muted); margin-top: 2px;
    }
    .empty-state {
        padding: 40px; text-align: center; color: var(--text-muted); font-style: italic;
    }

    /* Detalhe (de 05-split-detalhe.html) */
    .pkg-detail {
        background: rgba(255,255,255,0.06); border: 1px solid var(--card-border);
        border-radius: var(--radius-md); padding: 24px 26px;
        position: sticky; top: 20px; height: fit-content; max-height: calc(100vh - 40px);
        overflow-y: auto;
    }
    .pkg-detail .head {
        padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.078);
        margin-bottom: 18px;
    }
    .pkg-detail .head-img {
        width: 100%; aspect-ratio: 16/9; border-radius: var(--radius-md);
        background: linear-gradient(135deg, rgba(212,175,55,0.08), rgba(0,0,0,0.3));
        margin-bottom: 14px; overflow: hidden;
        display: flex; align-items: center; justify-content: center; font-size: 48px;
    }
    .pkg-detail .head-img img { width: 100%; height: 100%; object-fit: cover; }
    .pkg-detail h2 {
        font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 700;
        color: var(--primary); line-height: 1.3;
        display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
        overflow: hidden;
    }
    .pkg-detail .subtitle {
        font-size: 12px; color: var(--text-muted); margin-top: 6px;
        font-variant-numeric: tabular-nums;
    }
    .pkg-detail h2 .seq {
        font-family: 'Outfit', sans-serif; font-size: 14px; color: var(--text-muted);
        font-weight: 500; margin-left: 4px;
    }
    .meta-chips {
        display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px;
    }
    .meta-chip {
        font-size: 11px; padding: 4px 10px; border-radius: 999px;
        background: rgba(255,255,255,0.05); color: var(--text-secondary);
        border: 1px solid rgba(255,255,255,0.08);
    }
    .meta-chip b {
        color: var(--accent); font-size: 9px; text-transform: uppercase;
        letter-spacing: 0.05em; font-weight: 700; margin-right: 4px;
    }
    .unit-tag, .row-unit {
        font-family: 'Inter', sans-serif; font-size: 11px;
        font-weight: 400; color: var(--text-muted);
    }

    .summary-grid {
        display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
        margin-bottom: 22px;
    }
    .summary-cell {
        background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.065);
        border-radius: 10px; padding: 10px 14px;
    }
    .summary-cell .l {
        font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
        color: var(--text-muted); font-weight: 600;
    }
    .summary-cell .v {
        font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 700;
        color: var(--primary); margin-top: 2px;
    }
    .summary-cell .v.money { color: var(--success); }

    .vtl-title {
        font-size: 11px; text-transform: uppercase; font-weight: 700;
        letter-spacing: 0.07em; color: var(--text-secondary); margin-bottom: 14px;
    }
    .vtl { position: relative; padding-left: 32px; margin-bottom: 20px; }
    .vtl::before {
        content: ''; position: absolute; left: 13px; top: 8px; bottom: 8px;
        width: 2px; background: rgba(255,255,255,0.104);
    }
    .vtl-step {
        position: relative; padding: 10px 0; font-size: 13px;
        display: flex; justify-content: space-between; align-items: flex-start;
    }
    .vtl-step::before {
        content: ''; position: absolute; left: -27px; top: 14px;
        width: 16px; height: 16px; border-radius: 50%;
        background: #fff; border: 2px solid rgba(255,255,255,0.12);
    }
    .vtl-step .dot-ck {
        position: absolute; left: -24px; top: 17px; font-size: 10px;
        color: transparent; font-weight: 700; z-index: 1;
    }
    .vtl-step.done::before { background: var(--success); border-color: var(--success); }
    .vtl-step.done .dot-ck { color: #fff; }
    .vtl-step.current::before {
        background: var(--accent); border-color: var(--accent);
        box-shadow: 0 0 0 4px var(--accent-soft);
    }
    .vtl-step.current .label { color: var(--accent); font-weight: 700; }
    .vtl-step .label { font-weight: 600; color: var(--text-primary); }
    .vtl-step.done .label { color: var(--text-secondary); }
    .vtl-step .time {
        font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums;
    }
    .vtl-step .note {
        display: block; font-size: 11px; color: var(--text-muted); margin-top: 2px;
        font-weight: 400;
    }

    .detail-actions {
        display: flex; flex-direction: column; gap: 8px;
        padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.078);
    }
    .detail-actions button {
        padding: 10px 16px; border-radius: 12px; font-size: 13px; font-weight: 700;
        cursor: pointer; font-family: inherit; text-align: center; transition: var(--transition);
    }
    .btn-primary { background: var(--accent); color: var(--bg-main); border: none; }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-ghost {
        background: transparent; color: var(--text-secondary);
        border: 1px solid rgba(255,255,255,0.12);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.06); color: var(--primary); }

    @media (max-width: 1100px) {
        .layout { grid-template-columns: 220px 1fr; }
        .pkg-detail { grid-column: 1 / -1; position: static; max-height: none; }
    }
    @media (max-width: 700px) {
        body { padding: 16px; }
        .layout { grid-template-columns: 1fr; }
        .rail { position: static; }
    }

    /* ── Layout retrátil: rail + área de conteúdo ── */
    .layout { grid-template-columns: 240px 1fr; }

    .content-area {
        display: grid;
        grid-template-columns: 1fr;
        grid-template-rows: 1fr;
        min-height: 400px;
    }

    /* Ambos os painéis ocupam a mesma célula do grid */
    .packages-area,
    #section-finance {
        grid-area: 1 / 1;
    }

    .packages-area {
        display: grid;
        grid-template-columns: 1fr 420px;
        gap: 14px;
        transition: transform 0.42s cubic-bezier(0.16,1,0.3,1), opacity 0.32s ease;
        transform-origin: left center;
    }
    .packages-area.retracted {
        transform: scaleX(0.88) translateX(-28px);
        opacity: 0;
        pointer-events: none;
    }

    #section-finance {
        opacity: 0;
        transform: translateX(32px);
        pointer-events: none;
        visibility: hidden;
        transition: transform 0.42s cubic-bezier(0.16,1,0.3,1), opacity 0.32s ease, visibility 0s linear 0.42s;
    }
    #section-finance.active {
        opacity: 1;
        transform: translateX(0);
        pointer-events: all;
        visibility: visible;
        transition: transform 0.42s cubic-bezier(0.16,1,0.3,1), opacity 0.32s ease, visibility 0s linear 0s;
    }

    /* Bloco Financeiro — dropdown irmão de Comercial / Estoque */
    .fin-block {
        background: var(--card-bg); backdrop-filter: blur(14px);
        border: 1px solid var(--card-border); border-radius: var(--radius-lg);
        display: flex; align-items: center; gap: 10px;
        padding: 12px 14px; cursor: pointer; transition: background 0.2s;
    }
    .fin-block:hover { background: rgba(255,255,255,0.03); }
    .fin-block.active { background: var(--accent-soft); border-color: rgba(212,175,55,0.35); }
    .fin-block-label {
        flex: 1; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
        font-weight: 700; color: var(--accent);
    }
    .fin-block-amount {
        font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700;
        color: var(--text-primary); font-variant-numeric: tabular-nums;
    }
    .fin-block-chevron {
        font-size: 10px; color: var(--text-muted); transition: transform 0.3s;
    }
    .fin-block.active .fin-block-chevron { transform: rotate(180deg); }

    /* ── Finance section: KPIs ── */
    .finance-kpis {
        display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 18px;
    }
    .fin-kpi {
        background: var(--card-bg); border: 1px solid var(--card-border);
        border-radius: var(--radius-md); padding: 16px 18px;
    }
    .fin-kpi .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); font-weight: 600; margin-bottom: 7px; }
    .fin-kpi .val { font-family: 'Outfit', sans-serif; font-size: 22px; font-weight: 700; color: var(--primary); }
    .fin-kpi .meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    /* Aging bar */
    .aging-bar {
        display: flex; width: 100%; height: 14px;
        border-radius: 7px; overflow: hidden;
        background: rgba(255,255,255,0.05); margin: 8px 0 4px;
    }
    .aging-bucket { height: 100%; transition: width .3s ease; }
    .aging-bucket[data-bucket="0-7"]   { background: #22c55e; }
    .aging-bucket[data-bucket="8-15"]  { background: #eab308; }
    .aging-bucket[data-bucket="16-30"] { background: #f97316; }
    .aging-bucket[data-bucket="30+"]   { background: #ef4444; }
    .aging-legend { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
    .aging-legend-item { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-muted); }
    .aging-legend-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--c, #999); }

    /* Finance table header bar */
    .finance-bar-head {
        display: flex; align-items: center; justify-content: space-between;
        gap: 12px; padding: 13px 18px;
        border-bottom: 1px solid rgba(255,255,255,0.065);
        background: rgba(255,255,255,0.04);
        border-radius: var(--radius-md) var(--radius-md) 0 0;
    }
    .finance-bar-head-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .view-toggle {
        display: inline-flex; border: 1px solid rgba(255,255,255,0.1);
        border-radius: 7px; overflow: hidden;
    }
    .view-toggle .toggle-btn {
        background: transparent; color: var(--text-muted); padding: 5px 11px;
        border: none; cursor: pointer; font-size: 11px; font-family: inherit; font-weight: 600;
        transition: all 0.15s;
    }
    .view-toggle .toggle-btn.active { background: rgba(255,255,255,0.09); color: var(--text-primary); }
    .filter-btn {
        background: transparent; border: 1px solid rgba(255,255,255,0.08); color: var(--text-muted);
        padding: 4px 11px; border-radius: 6px; cursor: pointer; font-size: 11px;
        font-weight: 600; font-family: inherit; transition: all 0.15s;
    }
    .filter-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
    .filter-btn.active { background: var(--accent-soft); color: var(--accent); border-color: rgba(212,175,55,0.4); }

    /* Finance table */
    .fin-table-wrap {
        background: var(--card-bg); border: 1px solid var(--card-border);
        border-radius: var(--radius-md); overflow: hidden;
    }
    .fin-table { width: 100%; border-collapse: collapse; }
    .fin-table th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); font-weight: 600; padding: 9px 13px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.065); }
    .fin-table td { padding: 11px 13px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; color: var(--text-primary); }
    .fin-table tr:hover td { background: rgba(255,255,255,0.025); }
    .client-expand td { background: rgba(255,255,255,0.02); padding: 6px 16px; }

    .aging-badge { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 700; color: #fff; }
    .aging-badge.bucket-0-7    { background: #22c55e; }
    .aging-badge.bucket-8-15   { background: #eab308; color: #2a1a00; }
    .aging-badge.bucket-16-30  { background: #f97316; }
    .aging-badge.bucket-30plus { background: #ef4444; }

    .charges-mini { width: 100%; font-size: 12px; border-collapse: collapse; }
    .charges-mini th, .charges-mini td { padding: 5px 8px; }
    .charges-mini tr:hover td { background: rgba(255,255,255,0.03); }

    .btn-expand, .btn-history, .btn-writeoff {
        background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 4px 6px; border-radius: 4px; transition: color 0.15s;
    }
    .btn-expand:hover { color: var(--accent); }
    .btn-writeoff:hover { color: #ef4444; }
    .btn-history:hover { color: #22c55e; }

    .finance-pagination { display: flex; align-items: center; gap: 8px; padding: 10px 16px; font-size: 12px; color: var(--text-muted); border-top: 1px solid rgba(255,255,255,0.065); }
    .fin-page-btn { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; font-family: inherit; }
    .fin-page-btn:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.2); }

    /* Paginação da lista de pacotes/clientes */
    .list-pagination { display: flex; align-items: center; gap: 8px; padding: 10px 16px; font-size: 12px; color: var(--text-muted); border-top: 1px solid rgba(255,255,255,0.065); }
    .list-pagination:empty { display: none; }
    .list-pg-btn { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; font-family: inherit; }
    .list-pg-btn:hover:not(:disabled) { color: var(--text-primary); border-color: rgba(255,255,255,0.2); }
    .list-pg-btn:disabled { opacity: 0.35; cursor: default; }
    .list-pg-info { flex: 1; text-align: center; }

    /* Modal */
    .modal-backdrop {
        position: fixed; inset: 0; background: rgba(0,0,0,0.65);
        display: none; align-items: center; justify-content: center; z-index: 9999;
    }
    .modal-card {
        background: #1c1c1e; color: var(--text-primary); border-radius: 14px;
        padding: 24px; min-width: 320px; max-width: 560px; max-height: 80vh; overflow-y: auto;
        border: 1px solid rgba(255,255,255,0.1);
    }
    .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .modal-head h3 { font-size: 15px; font-weight: 700; }
    .modal-close { background: transparent; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; line-height: 1; }
    .modal-body { font-size: 13px; }
    .history-event { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .history-ts { margin-left: 8px; color: var(--text-muted); font-size: 11px; }
    .history-reason { margin-top: 4px; color: var(--text-secondary); font-style: italic; font-size: 12px; }

    @media (max-width: 1100px) {
        .packages-area { grid-template-columns: 1fr; }
        #section-finance .finance-kpis { grid-template-columns: repeat(2,1fr); }
    }
</style>
</head>
<body>

<header class="topbar">
    <div>
        <h1 id="greeting">Raylook</h1>
        <div class="sub">Pacotes em fluxo · Comercial e Estoque</div>
    </div>
    <a class="logout" href="/logout">Sair</a>
</header>

<div class="filter-bar" id="filter-bar">
    <span class="label">Período</span>
    <button class="filter-pill active" data-filter="all">Todos</button>
    <button class="filter-pill" data-filter="today">Hoje</button>
    <button class="filter-pill" data-filter="yesterday">Ontem</button>
    <button class="filter-pill" data-filter="7d">7 dias</button>
    <button class="filter-pill" data-filter="month">Este mês</button>
    <button class="filter-pill" data-filter="custom">Personalizado</button>
    <span class="filter-custom" id="filter-custom">
        <input type="date" id="filter-since">
        <span class="sep">→</span>
        <input type="date" id="filter-until">
        <button id="filter-apply">Aplicar</button>
    </span>
    <span class="filter-summary" id="filter-summary"></span>
</div>

<div class="layout">
    <!-- Sidebar: 3 dropdowns — Comercial, Estoque e Financeiro -->
    <div class="sidebar">
        <aside class="rail" id="rail">
            <!-- Grupos Comercial/Estoque injetados pelo dashboard_v2.js -->
        </aside>
        <div class="fin-block" id="fin-block">
            <span class="fin-block-label">Financeiro</span>
            <span class="fin-block-amount" id="fin-block-amount">—</span>
            <i class="fas fa-chevron-down fin-block-chevron"></i>
        </div>
    </div>

    <!-- Área de conteúdo: pacotes e financeiro empilhados, troca retrátil -->
    <div class="content-area">

        <!-- PAINEL PACOTES -->
        <div class="packages-area" id="packages-area">
            <div class="pkg-list">
                <div class="pkg-list-head">
                    <div>
                        <div class="pkg-list-title" id="list-title">Pacotes</div>
                        <div class="pkg-list-summary" id="list-summary"></div>
                    </div>
                    <input class="search-box" placeholder="🔍 Buscar…" id="search">
                </div>
                <div id="list"><div class="empty-state">Carregando…</div></div>
                <div id="list-pagination" class="list-pagination"></div>
            </div>
            <aside class="pkg-detail" id="detail"><div class="empty-state">Selecione um pacote</div></aside>
        </div>

        <!-- PAINEL FINANCEIRO -->
        <div id="section-finance">

            <!-- KPIs -->
            <div class="finance-kpis">
                <div class="fin-kpi">
                    <div class="lbl">Total a receber</div>
                    <div class="val" id="finance-receivable-total">—</div>
                    <div class="meta" id="finance-receivable-meta">—</div>
                </div>
                <div class="fin-kpi">
                    <div class="lbl">Vencimento</div>
                    <div class="aging-bar" id="finance-aging-bar">
                        <div class="aging-bucket" data-bucket="0-7"   style="width:0%"></div>
                        <div class="aging-bucket" data-bucket="8-15"  style="width:0%"></div>
                        <div class="aging-bucket" data-bucket="16-30" style="width:0%"></div>
                        <div class="aging-bucket" data-bucket="30+"   style="width:0%"></div>
                    </div>
                    <div class="aging-legend" id="finance-aging-legend"></div>
                </div>
                <div class="fin-kpi">
                    <div class="lbl">Tempo médio</div>
                    <div class="val" id="finance-avg-age">—</div>
                    <div class="meta" id="finance-avg-age-trend">—</div>
                </div>
                <div class="fin-kpi">
                    <div class="lbl">% Pago (30d)</div>
                    <div class="val" id="finance-paid-rate">—</div>
                    <div class="meta">últimos 30 dias</div>
                </div>
            </div>

            <!-- Tabela -->
            <div class="fin-table-wrap">
                <div class="finance-bar-head">
                    <div class="finance-bar-head-left">
                        <div class="view-toggle">
                            <button class="toggle-btn active" data-mode="by-client">Por cliente</button>
                            <button class="toggle-btn" data-mode="by-charge">Por cobrança</button>
                        </div>
                        <button class="filter-btn active" data-filter="all">Todos</button>
                        <button class="filter-btn" data-filter="0-7">0-7d</button>
                        <button class="filter-btn" data-filter="8-15">8-15d</button>
                        <button class="filter-btn" data-filter="16-30">16-30d</button>
                        <button class="filter-btn" data-filter="30+">30+d</button>
                        <button class="filter-btn" data-filter="written_off">Perdidos</button>
                    </div>
                    <input class="search-box" placeholder="🔍 Buscar cliente…" id="finance-search" style="width:200px;">
                </div>
                <table class="fin-table" id="finance-table">
                    <thead id="finance-thead">
                        <tr>
                            <th>Cliente</th><th>Celular</th><th>Total devido</th>
                            <th>Cobranças</th><th>Idade do mais antigo</th><th></th>
                        </tr>
                    </thead>
                    <tbody id="finance-table-body"></tbody>
                </table>
                <div class="finance-pagination">
                    <button class="fin-page-btn" id="finance-page-prev">← Anterior</button>
                    <span id="finance-pagination-summary" style="flex:1;text-align:center;">Página 1</span>
                    <button class="fin-page-btn" id="finance-page-next">Próxima →</button>
                </div>
            </div>

        </div><!-- /section-finance -->
    </div><!-- /content-area -->
</div><!-- /layout -->

<script src="/static/dashboard/lib.js"></script>
<script src="/static/dashboard/modal.js"></script>
<script src="/static/js/dashboard_v2.js"></script>
<script src="/static/js/finance-toggle.js"></script>
<script src="/static/js/finance.js"></script>
</body>
</html>
