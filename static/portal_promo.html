<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portal da Cliente — Raylook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            width: 1080px;
            height: 1350px;
            background: linear-gradient(135deg, #BA9797 0%, #C9A3A3 50%, #D9B3B3 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 90px 80px;
            color: #2D1F1F;
        }
        /* Glow decorations */
        .card::before {
            content: '';
            position: absolute;
            top: -200px;
            left: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(74, 59, 59, 0.25) 0%, transparent 60%);
            border-radius: 50%;
        }
        .card::after {
            content: '';
            position: absolute;
            bottom: -150px;
            right: -150px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(253, 215, 215, 0.5) 0%, transparent 60%);
            border-radius: 50%;
        }
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .brand {
            text-align: center;
            margin-bottom: 60px;
        }
        .brand-main {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 0.15em;
            color: #4A3B3B;
            display: block;
        }
        .brand-sub {
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.5em;
            color: #5C4A4A;
            text-transform: uppercase;
            margin-top: 8px;
        }

        .hero {
            text-align: center;
            margin-bottom: 40px;
        }
        .hero-icon {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FDD7D7, #fff);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            box-shadow: 0 15px 40px rgba(74, 59, 59, 0.2);
            font-size: 64px;
            color: #4A3B3B;
        }
        .hero-title {
            font-family: 'Outfit', sans-serif;
            font-size: 72px;
            font-weight: 800;
            line-height: 1.05;
            color: #2D1F1F;
            letter-spacing: -0.02em;
        }
        .hero-title .highlight {
            color: #4A3B3B;
            display: block;
        }
        .hero-subtitle {
            font-size: 26px;
            font-weight: 500;
            color: #5C4A4A;
            margin-top: 18px;
            line-height: 1.3;
        }

        .features {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 32px;
            padding: 40px;
            margin-top: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
        }
        .feature {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 24px;
            font-weight: 600;
            color: #2D1F1F;
            padding: 10px 0;
        }
        .feature i {
            color: #3E5A44;
            font-size: 26px;
            width: 40px;
        }

        .cta {
            margin-top: auto;
            text-align: center;
        }
        .cta-label {
            font-size: 20px;
            color: #5C4A4A;
            font-weight: 500;
            margin-bottom: 12px;
        }
        .cta-url {
            font-family: 'Outfit', sans-serif;
            font-size: 42px;
            font-weight: 800;
            color: #4A3B3B;
            background: #fff;
            padding: 24px 40px;
            border-radius: 100px;
            display: inline-block;
            letter-spacing: 0.01em;
            box-shadow: 0 15px 40px rgba(74, 59, 59, 0.25);
            border: 3px solid rgba(74, 59, 59, 0.1);
        }
        .cta-hint {
            margin-top: 20px;
            font-size: 20px;
            color: #4A3B3B;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="content">
            <div class="brand">
                <span class="brand-main">RAYLOOK</span>
                <span class="brand-sub">Assessoria</span>
            </div>

            <div class="hero">
                <div class="hero-icon">
                    <i class="fas fa-bag-shopping"></i>
                </div>
                <h1 class="hero-title">
                    Portal
                    <span class="highlight">da Cliente</span>
                </h1>
                <p class="hero-subtitle">Seus pedidos e pagamentos em um só lugar</p>
            </div>

            <div class="features">
                <div class="feature">
                    <i class="fas fa-check-circle"></i>
                    Ver todos os seus pedidos
                </div>
                <div class="feature">
                    <i class="fas fa-check-circle"></i>
                    Pagar via PIX a hora que quiser
                </div>
                <div class="feature">
                    <i class="fas fa-check-circle"></i>
                    Baixar comprovantes
                </div>
                <div class="feature">
                    <i class="fas fa-check-circle"></i>
                    Acompanhar tudo em tempo real
                </div>
            </div>

            <div class="cta">
                <div class="cta-label">Acesse agora:</div>
                <div class="cta-url">raylook.v4smc.com/portal</div>
                <div class="cta-hint">✨ Entre com o mesmo numero da enquete</div>
            </div>
        </div>
    </div>
</body>
</html>
