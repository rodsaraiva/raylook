<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Raylook · Fluxo 4 · Tabela por estado</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="_base.css">
<link rel="stylesheet" href="_modal.css">
<style>
    .state-tabs {
        display: flex; gap: 4px; flex-wrap: wrap; padding: 6px;
        background: rgba(255, 255, 255, 0.04); border: 1px solid var(--card-border);
        border-radius: var(--radius-md); margin-bottom: 18px; width: fit-content;
    }
    .state-tab {
        padding: 8px 16px; border-radius: var(--radius-sm);
        border: 1px solid transparent; background: transparent;
        display: flex; align-items: center; gap: 8px;
        font-size: 13px; font-weight: 600; color: var(--text-secondary);
        cursor: pointer; transition: var(--transition); font-family: inherit;
    }
    .state-tab:hover { background: rgba(255, 255, 255, 0.06); color: var(--primary); }
    .state-tab.active {
        background: rgba(255, 255, 255, 0.1); color: var(--primary);
        border-color: var(--accent-soft); box-shadow: 0 2px 8px rgba(0, 0, 0, 0.21);
    }
    .state-tab .count {
        font-family: 'Outfit', sans-serif; font-weight: 700;
        font-size: 12px; padding: 1px 8px; border-radius: 999px;
        background: rgba(255, 255, 255, 0.078); color: var(--text-muted);
    }
    .state-tab.active .count { background: var(--accent); color: #fff; }
    .state-tab .dot {
        width: 8px; height: 8px; border-radius: 50%; background: var(--dot-color, #aaa);
    }

    .tbl-wrap {
        background: rgba(255, 255, 255, 0.04); border: 1px solid var(--card-border);
        border-radius: var(--radius-md); overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
        text-align: left; font-weight: 700; font-size: 11px; text-transform: uppercase;
        letter-spacing: 0.08em; color: var(--text-secondary);
        padding: 14px 18px; background: rgba(255, 255, 255, 0.04);
        border-bottom: 1px solid rgba(255, 255, 255, 0.078);
    }
    th.num { text-align: right; }
    td {
        padding: 14px 18px; border-bottom: 1px solid rgba(255, 255, 255, 0.052);
        font-variant-numeric: tabular-nums; color: var(--text-primary);
        vertical-align: middle;
    }
    tr:last-child td { border-bottom: 0; }
    tr:hover td { background: rgba(255, 255, 255, 0.04); }
    td.num { text-align: right; }
    td .product {
        font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 14px; color: var(--primary);
    }
    td .sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    td .money {
        font-family: 'Outfit', sans-serif; font-weight: 700; color: var(--success);
    }
    .flow-mini {
        display: flex; align-items: center; gap: 4px; justify-content: flex-start;
    }
    .flow-mini span {
        width: 8px; height: 8px; border-radius: 50%; background: rgba(255, 255, 255, 0.104);
    }
    .flow-mini span.on { background: var(--accent); }
    .flow-mini span.current { background: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

    .action-btn {
        padding: 5px 12px; border-radius: 999px; font-size: 11px; font-weight: 700;
        border: 1px solid var(--accent); color: var(--accent);
        background: transparent; cursor: pointer; font-family: inherit;
        text-transform: uppercase; letter-spacing: 0.04em;
    }
    .action-btn:hover { background: var(--accent); color: #fff; }
    .action-btn.primary { background: var(--accent); color: #fff; }
    .action-btn.primary:hover { background: var(--primary); border-color: var(--primary); }

    .aging {
        display: inline-block; padding: 2px 8px; border-radius: 4px;
        font-size: 11px; font-weight: 600;
    }
    .aging.fresh { background: rgba(255, 255, 255, 0.052); color: var(--text-secondary); }
    .aging.warn  { background: var(--warning-soft); color: var(--warning); }
    .aging.stale { background: var(--danger-soft); color: var(--danger); }

    .empty-row td { text-align: center; padding: 28px; color: var(--text-muted); font-style: italic; }
</style>
</head>
<body>

<div class="mockup-brief">
    <span class="tag">Fluxo 4 / 5 · Tabela + tabs</span>
    <h1>Tabela densa com tabs por estado</h1>
    <p>Tabs filtram o estado; tabela mostra todos os pacotes com coluna "fluxo"
       (6 bolinhas) e envelhecimento. Dados de <code>/api/mockups/packages</code>.</p>
</div>

<div class="glass-card">
    <div class="state-tabs" id="tabs"></div>
    <div class="tbl-wrap">
        <table>
            <thead><tr>
                <th>Pacote</th>
                <th>Cliente(s)</th>
                <th>Fluxo</th>
                <th>Há</th>
                <th class="num">Peças</th>
                <th class="num">Valor</th>
                <th class="num">Ação</th>
            </tr></thead>
            <tbody id="tbody"><tr class="empty-row"><td colspan="7">Carregando…</td></tr></tbody>
        </table>
    </div>
</div>

<script src="_mockups-lib.js"></script>
<script src="_modal.js"></script>
<script src="04-tabela-por-estado.js"></script>
</body>
</html>
