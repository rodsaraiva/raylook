<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Raylook · Fluxo 5 · Lista + detalhe</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="_base.css">
<link rel="stylesheet" href="_modal.css">
<style>
    .split { display: grid; grid-template-columns: 1fr 420px; gap: 14px; }

    .pkg-list {
        background: rgba(255, 255, 255, 0.04); border: 1px solid var(--card-border);
        border-radius: var(--radius-md); overflow: hidden;
    }
    .pkg-list-head {
        padding: 14px 18px; display: flex; justify-content: space-between;
        align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.065);
        background: rgba(255, 255, 255, 0.04);
    }
    .pkg-list-title {
        font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 700; color: var(--primary);
    }
    .search-box {
        background: rgba(255,255,255,0.05); color: var(--text-primary); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px;
        padding: 6px 12px; font-size: 12px; color: var(--text-secondary); width: 220px;
        font-family: inherit;
    }

    .pkg-row {
        padding: 14px 18px; display: grid;
        grid-template-columns: 1fr auto auto; gap: 14px; align-items: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.052); cursor: pointer;
        transition: background 0.15s;
    }
    .pkg-row:hover { background: rgba(255, 255, 255, 0.06); }
    .pkg-row.selected {
        background: rgba(255, 255, 255, 0.1);
        border-left: 3px solid var(--accent); padding-left: 15px;
    }
    .pkg-row-main .name {
        font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700; color: var(--primary);
    }
    .pkg-row-main .sub {
        font-size: 11px; color: var(--text-muted); margin-top: 2px;
        font-variant-numeric: tabular-nums;
    }
    .pkg-row-meta {
        text-align: right; font-family: 'Outfit', sans-serif;
        font-size: 14px; font-weight: 700; color: var(--success);
    }
    .pkg-row-meta .sub {
        font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 400;
        color: var(--text-muted); margin-top: 2px;
    }
    .empty-state {
        padding: 40px; text-align: center; color: var(--text-muted); font-style: italic;
    }

    .pkg-detail {
        background: rgba(255, 255, 255, 0.06); border: 1px solid var(--card-border);
        border-radius: var(--radius-md); padding: 24px 26px;
        position: sticky; top: 20px; height: fit-content;
    }
    .pkg-detail .head {
        padding-bottom: 16px; border-bottom: 1px solid rgba(255, 255, 255, 0.078);
        margin-bottom: 18px;
    }
    .pkg-detail h2 {
        font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 700;
        color: var(--primary); line-height: 1.25;
    }
    .pkg-detail .subtitle {
        font-size: 12px; color: var(--text-muted); margin-top: 4px;
        font-variant-numeric: tabular-nums;
    }

    .summary-grid {
        display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
        margin-bottom: 22px;
    }
    .summary-cell {
        background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.065);
        border-radius: 10px; padding: 10px 14px;
    }
    .summary-cell .l {
        font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
        color: var(--text-muted); font-weight: 600;
    }
    .summary-cell .v {
        font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 700;
        color: var(--primary); margin-top: 2px;
    }
    .summary-cell .v.money { color: var(--success); }

    .vtl-title {
        font-size: 11px; text-transform: uppercase; font-weight: 700;
        letter-spacing: 0.07em; color: var(--text-secondary); margin-bottom: 14px;
    }
    .vtl { position: relative; padding-left: 32px; margin-bottom: 20px; }
    .vtl::before {
        content: ''; position: absolute; left: 13px; top: 8px; bottom: 8px;
        width: 2px; background: rgba(255, 255, 255, 0.104);
    }
    .vtl-step {
        position: relative; padding: 10px 0; font-size: 13px;
        display: flex; justify-content: space-between; align-items: flex-start;
    }
    .vtl-step::before {
        content: ''; position: absolute; left: -27px; top: 14px;
        width: 16px; height: 16px; border-radius: 50%;
        background: #fff; border: 2px solid rgba(255, 255, 255, 0.120);
    }
    .vtl-step .dot-ck {
        position: absolute; left: -24px; top: 17px; font-size: 10px;
        color: transparent; font-weight: 700; z-index: 1;
    }
    .vtl-step.done::before { background: var(--success); border-color: var(--success); }
    .vtl-step.done .dot-ck { color: #fff; }
    .vtl-step.current::before {
        background: var(--accent); border-color: var(--accent);
        box-shadow: 0 0 0 4px var(--accent-soft);
    }
    .vtl-step.current .label { color: var(--accent); font-weight: 700; }
    .vtl-step .label { font-weight: 600; color: var(--text-primary); }
    .vtl-step.done .label { color: var(--text-secondary); }
    .vtl-step .time {
        font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums;
    }
    .vtl-step .note {
        display: block; font-size: 11px; color: var(--text-muted); margin-top: 2px;
        font-weight: 400;
    }

    .detail-actions {
        display: flex; flex-direction: column; gap: 8px;
        padding-top: 16px; border-top: 1px solid rgba(255, 255, 255, 0.078);
    }
    .detail-actions button {
        padding: 10px 16px; border-radius: 12px; font-size: 13px; font-weight: 700;
        cursor: pointer; font-family: inherit; text-align: center; transition: var(--transition);
    }
    .btn-primary { background: var(--accent); color: #fff; border: none; }
    .btn-primary:hover { background: var(--primary); }
    .btn-ghost {
        background: transparent; color: var(--text-secondary);
        border: 1px solid rgba(255, 255, 255, 0.120);
    }
    .btn-ghost:hover { background: rgba(255, 255, 255, 0.06); color: var(--primary); }
</style>
</head>
<body>

<div class="mockup-brief">
    <span class="tag">Fluxo 5 / 5 · Split view</span>
    <h1>Lista à esquerda, rastreamento completo à direita</h1>
    <p>Estilo order tracking: clique num pacote da esquerda e veja a jornada nas 6
       etapas à direita. Dados vivos de <code>/api/mockups/packages</code>.</p>
</div>

<div class="split">
    <div class="pkg-list">
        <div class="pkg-list-head">
            <div class="pkg-list-title">Pacotes recentes</div>
            <input class="search-box" placeholder="🔍 Buscar…" id="search">
        </div>
        <div id="list"><div class="empty-state">Carregando…</div></div>
    </div>
    <aside class="pkg-detail" id="detail"><div class="empty-state">Selecione um pacote</div></aside>
</div>

<script src="_mockups-lib.js"></script>
<script src="_modal.js"></script>
<script src="05-split-detalhe.js"></script>
</body>
</html>
