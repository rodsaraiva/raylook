<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Raylook · Fluxo 3 · Grid + timeline no card</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="_base.css">
<link rel="stylesheet" href="_modal.css">
<style>
    .inv-filters {
        display: flex; gap: 14px; margin-bottom: 18px; align-items: flex-end;
        flex-wrap: wrap;
    }
    .inv-filter-group { display: flex; flex-direction: column; gap: 6px; }
    .inv-filter-group label {
        font-size: 11px; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.06em; color: var(--text-secondary);
    }
    .inv-chip {
        padding: 6px 14px; border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.104); background: rgba(255, 255, 255, 0.06);
        color: var(--text-secondary); font-size: 12px; font-weight: 600;
        cursor: pointer; transition: var(--transition); font-family: inherit;
    }
    .inv-chip:hover { background: rgba(255, 255, 255, 0.1); }
    .inv-chip.active {
        background: var(--accent); color: #fff; border-color: var(--accent);
    }
    .chip-group { display: flex; gap: 6px; flex-wrap: wrap; }

    .inv-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 14px; min-height: 100px;
    }
    .empty-state {
        grid-column: 1/-1; text-align: center; padding: 40px;
        color: var(--text-muted); font-style: italic;
    }

    .pkg-card {
        background: rgba(255, 255, 255, 0.06); border: 1px solid var(--card-border);
        border-radius: var(--radius-md); overflow: hidden;
        transition: var(--transition); display: flex; flex-direction: column;
    }
    .pkg-card:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(0, 0, 0, 0.42); }

    .pkg-card-head {
        padding: 14px 16px 12px;
        display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
    }
    .pkg-card-head .title {
        font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 700;
        color: var(--primary); line-height: 1.3;
    }
    .pkg-card-head .subtitle {
        font-size: 11px; color: var(--text-muted); margin-top: 3px;
        font-variant-numeric: tabular-nums;
    }

    .pkg-card-metrics {
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;
        padding: 12px 16px; background: rgba(255, 255, 255, 0.04);
        border-top: 1px solid rgba(255, 255, 255, 0.052);
        border-bottom: 1px solid rgba(255, 255, 255, 0.052);
    }
    .pkg-card-metrics div { display: flex; flex-direction: column; gap: 2px; }
    .pkg-card-metrics .v {
        font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 700;
        color: var(--primary); font-variant-numeric: tabular-nums;
    }
    .pkg-card-metrics .v.money { color: var(--success); }
    .pkg-card-metrics .l {
        font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
        color: var(--text-muted); font-weight: 600;
    }

    .mini-timeline {
        display: grid; grid-template-columns: repeat(6, 1fr);
        padding: 14px 16px; gap: 4px; position: relative;
    }
    .mini-timeline::before {
        content: ''; position: absolute; left: 20px; right: 20px; top: 24px;
        height: 2px; background: rgba(255, 255, 255, 0.104); border-radius: 1px;
    }
    .mini-timeline::after {
        content: ''; position: absolute; left: 20px; top: 24px; height: 2px;
        background: var(--success); border-radius: 1px;
        transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        width: var(--progress-width, 0);
    }
    .mt-step { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; z-index: 1; }
    .mt-dot {
        width: 18px; height: 18px; border-radius: 50%;
        background: #fff; border: 2px solid rgba(255, 255, 255, 0.120);
        display: flex; align-items: center; justify-content: center;
        font-size: 9px; color: var(--text-muted); font-weight: 700;
        transition: var(--transition);
    }
    .mt-label {
        font-size: 9px; text-transform: uppercase; font-weight: 700;
        letter-spacing: 0.04em; color: var(--text-muted); text-align: center;
    }
    .mt-step.done .mt-dot { background: var(--success); border-color: var(--success); color: #fff; }
    .mt-step.done .mt-label { color: var(--success); }
    .mt-step.current .mt-dot {
        background: var(--accent); border-color: var(--accent); color: #fff;
        box-shadow: 0 0 0 4px var(--accent-soft);
    }
    .mt-step.current .mt-label { color: var(--accent); font-weight: 800; }

    .pkg-card-foot {
        padding: 10px 16px; display: flex; justify-content: space-between; align-items: center;
        gap: 10px; font-size: 11px;
    }
    .pkg-card-foot .age { color: var(--text-muted); }
    .btn-action {
        background: var(--accent); color: #fff; border: none; padding: 6px 14px;
        border-radius: 999px; font-size: 11px; font-weight: 700; cursor: pointer;
        text-transform: uppercase; letter-spacing: 0.04em; transition: var(--transition);
        font-family: inherit;
    }
    .btn-action:hover { background: var(--primary); }
    .btn-action.ghost { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
</style>
</head>
<body>

<div class="mockup-brief">
    <span class="tag">Fluxo 3 / 5 · Cards com mini-timeline</span>
    <h1>Cada pacote mostra sua posição exata no fluxo</h1>
    <p>Grid familiar do estoque, cada card com mini-timeline de 6 etapas — verde
       para concluídas, laranja na atual. Dados de <code>/api/mockups/packages</code>.</p>
</div>

<div class="glass-card">
    <div class="inv-filters">
        <div class="inv-filter-group">
            <label>Status</label>
            <div class="chip-group" id="chip-group"></div>
        </div>
    </div>
    <div class="inv-grid" id="grid"><div class="empty-state">Carregando…</div></div>
</div>

<script src="_mockups-lib.js"></script>
<script src="_modal.js"></script>
<script src="03-grid-com-timeline.js"></script>
</body>
</html>
